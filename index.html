<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryve AI — Under Construction</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <style>
        /* Specific styles for the under construction page */
        .uc-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .uc-card {
            max-width: 600px;
            padding: 60px 40px;
            border-radius: var(--radius-xl);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.8s ease forwards;
        }

        .uc-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple), var(--accent-pink));
        }

        .uc-logo {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: -0.02em;
        }

        .uc-logo span {
            color: var(--accent-cyan);
        }

        .uc-icon {
            font-size: 4rem;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 3s infinite;
        }

        .uc-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 20px;
        }

        .uc-subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .uc-notify {
            display: flex;
            gap: 10px;
            max-width: 400px;
            margin: 0 auto 40px;
        }

        .uc-input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-family: var(--font-body);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .uc-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }

        .uc-socials {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .uc-socials a {
            color: var(--text-muted);
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .uc-socials a:hover {
            color: var(--accent-cyan);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="uc-container">
        <div class="uc-card glass">
            <div class="uc-logo">Ryve <span>AI</span></div>
            
            <div class="uc-icon">
                <i class="fas fa-tools"></i>
            </div>
            
            <h1 class="uc-title text-gradient">Something Awesome is Coming</h1>
            
            <p class="uc-subtitle">We are currently building our new platform. Our AI-powered revenue recovery systems will be live very soon. Leave your email to be notified when we launch!</p>
            
           
        </div>
    </div>

</body>
</html>
